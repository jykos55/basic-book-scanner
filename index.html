<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Book Nook — Book Scanner</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQm9vayBOb29rIiwic2hvcnRfbmFtZSI6IkJvb2sgTm9vayIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjRjNFRkU0IiwidGhlbWVfY29sb3IiOiIjMzM0QTM5In0=">
<style>
  :root{
    --paper:#F3EFE4;
    --paper-dim:#E9E2D2;
    --ink:#22201C;
    --spine-green:#334A39;
    --spine-green-dark:#233229;
    --rust:#8A5A3B;
    --rust-dark:#6E4630;
    --gold:#B08D3E;
    --line:#D8CFB8;
    --danger:#8C3B2E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Iowan Old Style','Palatino Linotype',Georgia,serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;}

  header{
    background:var(--spine-green);
    color:var(--paper);
    padding:22px 20px 26px;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute;
    right:-10px; top:-30px;
    width:140px; height:220px;
    border:2px solid rgba(243,239,228,0.15);
    border-radius:3px;
    transform:rotate(12deg);
  }
  header h1{
    margin:0;
    font-size:26px;
    letter-spacing:0.02em;
    font-weight:600;
  }
  header p{
    margin:6px 0 0;
    font-size:13px;
    color:#CFE0D2;
    letter-spacing:0.04em;
    text-transform:uppercase;
  }

  main{
    max-width:640px;
    margin:0 auto;
    padding:18px 16px 40px;
  }

  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:6px;
    padding:18px;
    margin-bottom:18px;
    box-shadow:0 1px 0 rgba(0,0,0,0.03);
  }

  .scan-card{
    background:var(--spine-green-dark);
    color:var(--paper);
    text-align:center;
  }
  #video-wrap{
    position:relative;
    width:100%;
    aspect-ratio:4/3;
    background:#111;
    border-radius:4px;
    overflow:hidden;
    display:none;
    margin-bottom:14px;
  }
  #video-wrap.active{display:block;}
  video{width:100%; height:100%; object-fit:cover;}
  .scan-line{
    position:absolute; left:6%; right:6%; top:50%;
    height:2px;
    background:var(--gold);
    box-shadow:0 0 8px 1px var(--gold);
    animation:sweep 1.8s ease-in-out infinite;
  }
  @keyframes sweep{
    0%,100%{top:20%;}
    50%{top:80%;}
  }

  button{
    font-family:inherit;
    font-size:15px;
    border:none;
    border-radius:5px;
    padding:12px 18px;
    cursor:pointer;
    font-weight:600;
    letter-spacing:0.01em;
    transition:transform 0.05s ease, opacity 0.15s ease;
  }
  button:active{transform:scale(0.98);}
  .btn-primary{background:var(--rust); color:#fff;}
  .btn-primary:hover{background:var(--rust-dark);}
  .btn-ghost{background:transparent; color:var(--paper); border:1px solid rgba(243,239,228,0.4);}
  .btn-block{width:100%;}
  .btn-secondary{background:var(--paper-dim); color:var(--ink); border:1px solid var(--line);}
  button:disabled{opacity:0.5; cursor:not-allowed;}

  .manual-row{
    display:flex; gap:8px; margin-top:12px;
  }
  .manual-row input{
    flex:1;
    padding:11px 12px;
    border-radius:5px;
    border:1px solid rgba(243,239,228,0.35);
    background:rgba(255,255,255,0.06);
    color:var(--paper);
    font-family:inherit;
    font-size:15px;
  }
  .manual-row input::placeholder{color:rgba(243,239,228,0.5);}

  .divider-word{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:rgba(243,239,228,0.45);
    margin:16px 0 4px;
  }

  .title-results{
    margin-top:10px;
    text-align:left;
  }
  .title-result{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(243,239,228,0.2);
    border-radius:5px;
    padding:10px 12px;
    margin-bottom:8px;
    cursor:pointer;
  }
  .title-result:hover{background:rgba(255,255,255,0.12);}
  .title-result .tr-title{font-weight:600; font-size:14px; color:var(--paper);}
  .title-result .tr-meta{font-size:12px; color:#CFE0D2; margin-top:2px;}

  .status-line{
    font-size:13px;
    min-height:18px;
    margin-top:10px;
    color:#CFE0D2;
  }
  .status-line.error{color:#E7B7A8;}

  .field{margin-bottom:12px;}
  .field label{
    display:block;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:#6B6558;
    margin-bottom:5px;
  }
  .field input[type=text]{
    width:100%;
    padding:10px 11px;
    border:1px solid var(--line);
    border-radius:4px;
    font-family:inherit;
    font-size:16px;
    background:var(--paper);
    color:var(--ink);
  }
  .field select{
    width:100%;
    padding:10px 11px;
    border:1px solid var(--line);
    border-radius:4px;
    font-family:inherit;
    font-size:16px;
    background:var(--paper);
    color:var(--ink);
    appearance:none;
    -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24'><path fill='%2322201C' d='M7 10l5 5 5-5z'/></svg>");
    background-repeat:no-repeat;
    background-position:right 10px center;
  }
  .field select.has-custom-open{
    border-bottom-left-radius:0;
    border-bottom-right-radius:0;
  }
  .field .custom-input{
    width:100%;
    padding:10px 11px;
    border:1px solid var(--rust);
    border-top:none;
    border-radius:0 0 4px 4px;
    font-family:inherit;
    font-size:16px;
    background:var(--paper);
    color:var(--ink);
  }
  .field-row{
    display:flex;
    gap:10px;
  }
  .field-row .field{flex:1;}

  .toggle-row{
    display:flex;
    gap:20px;
    margin:4px 0 16px;
  }
  .toggle{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:14px;
  }
  .toggle input{width:18px; height:18px; accent-color:var(--gold);}

  .entry-actions{display:flex; gap:10px;}

  h2.section-title{
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:#6B6558;
    margin:0 0 10px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  h2.section-title span.count{
    font-family:monospace;
    color:var(--gold);
    font-size:13px;
  }

  .book-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:12px 0;
    border-bottom:1px solid var(--line);
    gap:10px;
  }
  .book-row:last-child{border-bottom:none;}
  .book-row-main{display:flex; gap:10px; flex:1; min-width:0;}
  .book-cover{
    width:38px;
    height:56px;
    object-fit:cover;
    border-radius:3px;
    border:1px solid var(--line);
    flex-shrink:0;
    background:var(--paper-dim);
  }
  .cover-preview-wrap{
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:6px;
  }
  .cover-preview{
    width:48px;
    height:70px;
    object-fit:cover;
    border-radius:3px;
    border:1px solid var(--line);
    background:var(--paper-dim);
    display:none;
  }
  .cover-preview.has-image{display:block;}
  .book-title{font-weight:600; font-size:15px; line-height:1.3;}
  .book-title .fav-star{color:var(--gold); margin-left:4px;}
  .book-author{font-size:13px; color:#6B6558; margin-top:2px;}
  .book-meta{font-size:11px; color:#9C9686; margin-top:4px; font-family:monospace;}
  .badges{display:flex; gap:6px; margin-top:6px; flex-wrap:wrap;}
  .badge{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    padding:2px 7px;
    border-radius:3px;
    font-weight:700;
  }
  .badge-tbr{background:#EFE1C2; color:#7A5C1E;}
  .badge-reading{background:#DDE6EF; color:#2E4E6E;}
  .badge-read{background:#D9E6DA; color:var(--spine-green-dark);}
  .badge-dnf{background:#F0DAD2; color:var(--danger);}
  .badge-format{background:var(--paper-dim); color:#6B6558;}
  .badge-source{background:#EFE7DA; color:#8A5A3B;}
  .badge-lent{background:#F0DAD2; color:var(--danger);}
  .badge-rating{background:#F5EAC9; color:#7A5C1E;}
  .del-btn{
    background:none;
    border:none;
    color:var(--danger);
    font-size:13px;
    padding:4px 6px;
    text-decoration:underline;
    font-weight:400;
  }

  .star-rating{
    display:flex;
    gap:6px;
    font-size:26px;
    line-height:1;
  }
  .star-rating span{
    cursor:pointer;
    color:var(--line);
    user-select:none;
  }
  .star-rating span.filled{color:var(--gold);}

  .shelf-status{
    font-size:13px;
    color:#6B6558;
    margin-bottom:8px;
  }
  .shelf-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    grid-auto-rows:30px;
    gap:4px;
    background:var(--rust-dark);
    padding:8px;
    border-radius:5px;
  }
  .shelf-cell{
    background:var(--paper-dim);
    border:1px solid var(--line);
    border-radius:3px;
    cursor:pointer;
    padding:0;
  }
  .shelf-cell.selected{
    background:var(--gold);
    border-color:var(--gold);
  }
  .shelf-clear{
    margin-top:8px;
    background:none;
    border:none;
    color:var(--rust);
    font-size:12px;
    text-decoration:underline;
    padding:2px 0;
  }

  .empty-state{
    text-align:center;
    color:#9C9686;
    font-size:14px;
    padding:20px 0;
  }

  footer.export-bar{
    position:fixed;
    left:0; right:0; bottom:0;
    background:var(--paper);
    border-top:1px solid var(--line);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  footer.export-bar button{padding:12px 14px;}
  footer.export-bar .btn-block{flex:1 1 auto; min-width:140px;}
  .hidden{display:none !important;}
</style>
</head>
<body>

<header>
  <h1>Book Nook</h1>
  <p>Scan · Log · Export to Notion</p>
</header>

<main>

  <section class="card scan-card">
    <div id="video-wrap">
      <video id="video" muted playsinline></video>
      <div class="scan-line"></div>
    </div>
    <button id="scan-toggle" class="btn-primary btn-block">Start scanning</button>
    <div class="status-line" id="scan-status">Point the camera at the barcode on the back of the book.</div>

    <div class="manual-row">
      <input type="text" id="manual-isbn" inputmode="numeric" placeholder="or type ISBN manually">
      <button id="manual-lookup" class="btn-ghost">Look up</button>
    </div>

    <div class="divider-word">or search by title</div>
    <div class="manual-row">
      <input type="text" id="manual-title" placeholder="Book title">
      <button id="title-lookup" class="btn-ghost">Search</button>
    </div>
    <div class="title-results hidden" id="title-results"></div>
  </section>

  <section class="card hidden" id="entry-card">
    <h2 class="section-title">New entry</h2>
    <div class="field">
      <label for="f-title">Title</label>
      <input type="text" id="f-title">
    </div>
    <div class="field">
      <label for="f-author">Author</label>
      <input type="text" id="f-author">
    </div>
    <div class="field-row">
      <div class="field">
        <label for="f-isbn">ISBN</label>
        <input type="text" id="f-isbn" class="mono">
      </div>
      <div class="field">
        <label for="f-year">Year published</label>
        <input type="text" id="f-year" inputmode="numeric">
      </div>
    </div>

    <div class="field-row">
      <div class="field" id="wrap-format">
        <label for="f-format">Format</label>
        <select id="f-format">
          <option value="">Select format…</option>
          <option value="Paperback">Paperback</option>
          <option value="Hardcover">Hardcover</option>
          <option value="__custom__">Custom…</option>
        </select>
      </div>
      <div class="field" id="wrap-status">
        <label for="f-status">Status</label>
        <select id="f-status">
          <option value="">Select status…</option>
          <option value="TBR">TBR</option>
          <option value="Reading">Reading</option>
          <option value="Read">Read</option>
          <option value="DNF">DNF</option>
          <option value="__custom__">Custom…</option>
        </select>
      </div>
    </div>

    <div class="field" id="wrap-source">
      <label for="f-source">Source</label>
      <select id="f-source">
        <option value="">Select source…</option>
        <option value="Bookshop">Bookshop</option>
        <option value="Op shop">Op shop</option>
        <option value="Fair">Fair</option>
        <option value="Gift">Gift</option>
        <option value="__custom__">Custom…</option>
      </select>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="f-publisher">Publisher</label>
        <input type="text" id="f-publisher">
      </div>
      <div class="field">
        <label for="f-pagecount">Page count</label>
        <input type="text" id="f-pagecount" inputmode="numeric">
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="f-language">Language</label>
        <input type="text" id="f-language">
      </div>
      <div class="field" id="wrap-genre">
        <label for="f-genre">Genre</label>
        <select id="f-genre">
          <option value="">Select genre…</option>
          <option value="Fiction">Fiction</option>
          <option value="Non-fiction">Non-fiction</option>
          <option value="Fantasy">Fantasy</option>
          <option value="Science Fiction">Science Fiction</option>
          <option value="Mystery/Thriller">Mystery/Thriller</option>
          <option value="Romance">Romance</option>
          <option value="Historical Fiction">Historical Fiction</option>
          <option value="Biography/Memoir">Biography/Memoir</option>
          <option value="Poetry">Poetry</option>
          <option value="Young Adult">Young Adult</option>
          <option value="__custom__">Custom…</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="f-dimensions">Physical dimensions</label>
      <input type="text" id="f-dimensions" placeholder="often unavailable">
    </div>

    <div class="field">
      <label for="f-cover">Cover image URL</label>
      <div class="cover-preview-wrap">
        <input type="text" id="f-cover" style="flex:1;">
        <img id="cover-preview" class="cover-preview" alt="Cover preview">
      </div>
    </div>

    <div class="field">
      <label>Rating</label>
      <div class="star-rating" id="f-rating" data-value="0">
        <span data-star="1">★</span>
        <span data-star="2">★</span>
        <span data-star="3">★</span>
        <span data-star="4">★</span>
        <span data-star="5">★</span>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="f-series">Series</label>
        <input type="text" id="f-series">
      </div>
      <div class="field">
        <label for="f-series-num">Series #</label>
        <input type="text" id="f-series-num" inputmode="numeric">
      </div>
    </div>

    <div class="field">
      <label>Shelf location</label>
      <div class="shelf-status" id="shelf-status">No location set</div>
      <div class="shelf-grid" id="shelf-grid"></div>
      <button type="button" class="shelf-clear" id="shelf-clear">Clear location</button>
    </div>

    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="f-favourite"> Favourite</label>
      <label class="toggle"><input type="checkbox" id="f-lent"> Lent out</label>
    </div>
    <div class="field hidden" id="wrap-lent-to">
      <label for="f-lent-to">Lent to</label>
      <input type="text" id="f-lent-to">
    </div>

    <div class="entry-actions">
      <button id="add-book" class="btn-primary btn-block">Add to list</button>
      <button id="cancel-entry" class="btn-secondary">Cancel</button>
    </div>
  </section>

  <section class="card">
    <h2 class="section-title">Your books <span class="count" id="book-count">0</span></h2>
    <div id="book-list"></div>
    <div class="empty-state" id="empty-state">No books yet — scan one to get started.</div>
  </section>

</main>

<footer class="export-bar">
  <button id="export-csv" class="btn-secondary btn-block">Export CSV for Notion</button>
  <button id="import-csv" class="btn-secondary">Import CSV</button>
  <input type="file" id="import-file" accept=".csv,text/csv" class="hidden">
  <button id="clear-all" class="btn-ghost" style="color:var(--danger); border-color:var(--danger);">Clear</button>
</footer>

<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
(function(){
  "use strict";

  const STORAGE_KEY = 'book-nook-list';
  let books = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  const scanToggleBtn = document.getElementById('scan-toggle');
  const videoWrap = document.getElementById('video-wrap');
  const video = document.getElementById('video');
  const scanStatus = document.getElementById('scan-status');
  const manualIsbnInput = document.getElementById('manual-isbn');
  const manualLookupBtn = document.getElementById('manual-lookup');
  const manualTitleInput = document.getElementById('manual-title');
  const titleLookupBtn = document.getElementById('title-lookup');
  const titleResultsEl = document.getElementById('title-results');

  const entryCard = document.getElementById('entry-card');
  const fTitle = document.getElementById('f-title');
  const fAuthor = document.getElementById('f-author');
  const fIsbn = document.getElementById('f-isbn');
  const fYear = document.getElementById('f-year');
  const fPublisher = document.getElementById('f-publisher');
  const fPageCount = document.getElementById('f-pagecount');
  const fLanguage = document.getElementById('f-language');
  const fDimensions = document.getElementById('f-dimensions');
  const fCover = document.getElementById('f-cover');
  const coverPreview = document.getElementById('cover-preview');
  const fFavourite = document.getElementById('f-favourite');
  const fLent = document.getElementById('f-lent');
  const wrapLentTo = document.getElementById('wrap-lent-to');
  const fLentTo = document.getElementById('f-lent-to');
  const fSeries = document.getElementById('f-series');
  const fSeriesNum = document.getElementById('f-series-num');
  const ratingWidget = document.getElementById('f-rating');
  const ratingStars = Array.from(ratingWidget.querySelectorAll('span'));
  const shelfStatusEl = document.getElementById('shelf-status');
  const shelfGridEl = document.getElementById('shelf-grid');
  const shelfClearBtn = document.getElementById('shelf-clear');
  const addBookBtn = document.getElementById('add-book');
  const cancelEntryBtn = document.getElementById('cancel-entry');

  const bookListEl = document.getElementById('book-list');
  const bookCountEl = document.getElementById('book-count');
  const emptyState = document.getElementById('empty-state');

  const exportBtn = document.getElementById('export-csv');
  const importBtn = document.getElementById('import-csv');
  const importFileInput = document.getElementById('import-file');
  const clearBtn = document.getElementById('clear-all');

  let codeReader = null;
  let scanning = false;

  // ---- select-with-custom-option helper ----
  // Wires a <select> so choosing "Custom…" reveals a text input beneath it.
  // Returns {getValue(), setValue(val), reset()}
  function makeCustomSelect(wrapId, selectId){
    const wrap = document.getElementById(wrapId);
    const select = document.getElementById(selectId);
    let customInput = null;

    function ensureCustomInput(){
      if(customInput) return customInput;
      customInput = document.createElement('input');
      customInput.type = 'text';
      customInput.className = 'custom-input';
      customInput.placeholder = 'Enter custom value';
      wrap.appendChild(customInput);
      return customInput;
    }

    select.addEventListener('change', () => {
      if(select.value === '__custom__'){
        select.classList.add('has-custom-open');
        ensureCustomInput().classList.remove('hidden');
        ensureCustomInput().focus();
      } else if(customInput){
        select.classList.remove('has-custom-open');
        customInput.classList.add('hidden');
      }
    });

    return {
      getValue(){
        if(select.value === '__custom__'){
          return customInput ? customInput.value.trim() : '';
        }
        return select.value;
      },
      setValue(val){
        const options = Array.from(select.options).map(o => o.value);
        if(val && options.indexOf(val) !== -1 && val !== '__custom__'){
          select.value = val;
          select.classList.remove('has-custom-open');
          if(customInput) customInput.classList.add('hidden');
        } else if(val){
          select.value = '__custom__';
          select.classList.add('has-custom-open');
          ensureCustomInput().value = val;
          ensureCustomInput().classList.remove('hidden');
        } else {
          select.selectedIndex = 0;
          select.classList.remove('has-custom-open');
          if(customInput) customInput.classList.add('hidden');
        }
      },
      reset(){
        select.selectedIndex = 0;
        select.classList.remove('has-custom-open');
        if(customInput) customInput.classList.add('hidden');
      }
    };
  }

  const formatField = makeCustomSelect('wrap-format', 'f-format');
  const statusField = makeCustomSelect('wrap-status', 'f-status');
  const sourceField = makeCustomSelect('wrap-source', 'f-source');
  const genreField = makeCustomSelect('wrap-genre', 'f-genre');

  const GENRE_KEYWORDS = [
    ['Fantasy', ['fantasy']],
    ['Science Fiction', ['science fiction', 'sci-fi']],
    ['Mystery/Thriller', ['mystery', 'thriller', 'detective']],
    ['Romance', ['romance']],
    ['Historical Fiction', ['historical fiction']],
    ['Biography/Memoir', ['biography', 'memoir', 'autobiography']],
    ['Poetry', ['poetry', 'poems']],
    ['Young Adult', ['young adult', 'juvenile fiction']],
    ['Non-fiction', ['nonfiction', 'non-fiction']],
    ['Fiction', ['fiction']]
  ];

  function guessGenre(subjects){
    if(!subjects || !subjects.length) return '';
    const text = subjects.join(' ').toLowerCase();
    for(const [genre, keywords] of GENRE_KEYWORDS){
      if(keywords.some(k => text.indexOf(k) !== -1)) return genre;
    }
    return '';
  }

  function updateCoverPreview(url){
    if(url){
      coverPreview.src = url;
      coverPreview.classList.add('has-image');
    } else {
      coverPreview.src = '';
      coverPreview.classList.remove('has-image');
    }
  }
  fCover.addEventListener('input', () => updateCoverPreview(fCover.value.trim()));

  // ---- rating widget ----
  let currentRating = 0;
  function setRating(val){
    currentRating = val;
    ratingWidget.dataset.value = String(val);
    ratingStars.forEach(s => {
      s.classList.toggle('filled', Number(s.dataset.star) <= val);
    });
  }
  ratingStars.forEach(s => {
    s.addEventListener('click', () => {
      const val = Number(s.dataset.star);
      setRating(val === currentRating ? 0 : val);
    });
  });

  // ---- lent-out toggle ----
  fLent.addEventListener('change', () => {
    wrapLentTo.classList.toggle('hidden', !fLent.checked);
    if(!fLent.checked) fLentTo.value = '';
  });

  // ---- shelf location: 3 bays wide, 7 shelves tall ----
  let selectedShelf = '';
  function buildShelfGrid(){
    shelfGridEl.innerHTML = '';
    for(let row = 1; row <= 7; row++){
      for(let col = 1; col <= 3; col++){
        const cell = document.createElement('button');
        cell.type = 'button';
        cell.className = 'shelf-cell';
        const value = 'R' + row + 'B' + col;
        cell.dataset.value = value;
        cell.title = 'Shelf ' + row + ', Bay ' + col;
        cell.addEventListener('click', () => selectShelf(value));
        shelfGridEl.appendChild(cell);
      }
    }
  }
  function selectShelf(value){
    selectedShelf = (selectedShelf === value) ? '' : value;
    Array.from(shelfGridEl.children).forEach(cell => {
      cell.classList.toggle('selected', cell.dataset.value === selectedShelf);
    });
    updateShelfStatus();
  }
  function shelfLabel(value){
    if(!value) return '';
    const m = value.match(/^R(\d+)B(\d+)$/);
    return m ? ('Shelf ' + m[1] + ', Bay ' + m[2]) : '';
  }
  function updateShelfStatus(){
    shelfStatusEl.textContent = selectedShelf ? shelfLabel(selectedShelf) : 'No location set';
  }
  buildShelfGrid();
  shelfClearBtn.addEventListener('click', () => selectShelf(''));

  function setStatus(msg, isError){
    scanStatus.textContent = msg;
    scanStatus.classList.toggle('error', !!isError);
  }

  function openEntry(data){
    fTitle.value = (data && data.title) || '';
    fAuthor.value = (data && data.author) || '';
    fIsbn.value = (data && data.isbn) || '';
    fYear.value = (data && data.year) || '';
    fPublisher.value = (data && data.publisher) || '';
    fPageCount.value = (data && data.pageCount) || '';
    fLanguage.value = (data && data.language) || '';
    fDimensions.value = (data && data.dimensions) || '';
    fCover.value = (data && data.cover) || '';
    updateCoverPreview((data && data.cover) || '');
    fFavourite.checked = false;
    fLent.checked = false;
    wrapLentTo.classList.add('hidden');
    fLentTo.value = '';
    fSeries.value = '';
    fSeriesNum.value = '';
    setRating(0);
    selectShelf('');
    formatField.setValue((data && data.format) || null);
    statusField.setValue((data && data.status) || null);
    sourceField.setValue(null);
    genreField.setValue((data && data.genre) || null);
    entryCard.classList.remove('hidden');
    titleResultsEl.classList.add('hidden');
    titleResultsEl.innerHTML = '';
    entryCard.scrollIntoView({behavior:'smooth', block:'nearest'});
  }

  function closeEntry(){
    entryCard.classList.add('hidden');
  }

  function extractYear(str){
    if(!str) return '';
    const m = String(str).match(/\d{4}/);
    return m ? m[0] : '';
  }

  async function lookupISBN(isbn){
    setStatus('Looking up ' + isbn + '…');
    let found = false;
    const result = {isbn: isbn};

    try{
      const res = await fetch('https://openlibrary.org/api/books?bibkeys=ISBN:' + isbn + '&format=json&jscmd=data');
      const data = await res.json();
      const key = 'ISBN:' + isbn;
      if(data[key] && data[key].title){
        found = true;
        const rec = data[key];
        result.title = rec.title || '';
        result.author = (rec.authors || []).map(a => a.name).join(', ');
        result.year = extractYear(rec.publish_date);
        result.publisher = (rec.publishers || []).map(p => p.name).join(', ');
        result.pageCount = rec.number_of_pages ? String(rec.number_of_pages) : '';
        result.dimensions = rec.physical_dimensions || '';
        result.cover = (rec.cover && (rec.cover.large || rec.cover.medium || rec.cover.small)) || '';
        const subjects = (rec.subjects || []).map(s => s.name || s);
        result.genre = guessGenre(subjects);
      }
    }catch(e){ /* fall through to Google Books */ }

    try{
      const res = await fetch('https://www.googleapis.com/books/v1/volumes?q=isbn:' + isbn);
      const data = await res.json();
      if(data.items && data.items.length){
        const info = data.items[0].volumeInfo;
        found = true;
        if(!result.title) result.title = info.title || '';
        if(!result.author) result.author = (info.authors || []).join(', ');
        if(!result.year) result.year = extractYear(info.publishedDate);
        if(!result.publisher) result.publisher = info.publisher || '';
        if(!result.pageCount) result.pageCount = info.pageCount ? String(info.pageCount) : '';
        if(!result.cover) result.cover = (info.imageLinks && (info.imageLinks.thumbnail || info.imageLinks.smallThumbnail)) || '';
        result.language = info.language || '';
        if(!result.genre) result.genre = guessGenre(info.categories || []);
      }
    }catch(e){ /* no luck */ }

    return found ? result : null;
  }

  function findDuplicate(isbn){
    if(!isbn) return null;
    return books.find(b => b.isbn && b.isbn === isbn) || null;
  }

  async function handleScannedCode(isbn){
    isbn = isbn.replace(/[^0-9Xx]/g, '');
    stopScanning();

    const dup = findDuplicate(isbn);
    if(dup){
      const proceed = confirm('You already have "' + dup.title + '" in your list (added ' + dup.dateAdded + '). Add it again anyway?');
      if(!proceed){
        setStatus('Skipped — already in your library.', false);
        return;
      }
    }

    const result = await lookupISBN(isbn);
    if(result){
      setStatus('Found: ' + result.title, false);
      openEntry(result);
    } else {
      setStatus('No match found for ' + isbn + ' — fill it in manually below.', true);
      openEntry({isbn: isbn});
    }
  }

  // ---- title search ----
  async function searchByTitle(title){
    setStatus('Searching for "' + title + '"…');
    titleResultsEl.innerHTML = '';
    titleResultsEl.classList.add('hidden');
    try{
      const res = await fetch('https://openlibrary.org/search.json?title=' + encodeURIComponent(title) + '&limit=8');
      const data = await res.json();
      const docs = (data.docs || []).filter(d => d.title).slice(0, 6);
      if(docs.length === 0){
        setStatus('No matches found for "' + title + '". Try a different search or add manually.', true);
        openEntry({title: title});
        return;
      }
      renderTitleResults(docs);
      setStatus('Pick the closest match below.', false);
    }catch(e){
      setStatus('Title search failed: ' + (e.message || e), true);
    }
  }

  function renderTitleResults(docs){
    titleResultsEl.innerHTML = '';
    docs.forEach(doc => {
      const el = document.createElement('div');
      el.className = 'title-result';
      const t = document.createElement('div');
      t.className = 'tr-title';
      t.textContent = doc.title;
      const m = document.createElement('div');
      m.className = 'tr-meta';
      const author = (doc.author_name || []).join(', ') || 'Unknown author';
      const year = doc.first_publish_year || '';
      m.textContent = author + (year ? ' · ' + year : '');
      el.appendChild(t);
      el.appendChild(m);
      el.addEventListener('click', () => {
        const isbn = (doc.isbn && doc.isbn.length) ? doc.isbn[0] : '';
        openEntry({
          title: doc.title,
          author: author === 'Unknown author' ? '' : author,
          isbn: isbn,
          year: year ? String(year) : ''
        });
      });
      titleResultsEl.appendChild(el);
    });
    titleResultsEl.classList.remove('hidden');
  }

  async function startScanning(){
    if(scanning) return;
    if(!('BrowserMultiFormatReader' in ZXing)){
      setStatus('Barcode library failed to load. Check your connection.', true);
      return;
    }
    try{
      codeReader = new ZXing.BrowserMultiFormatReader();
      videoWrap.classList.add('active');
      scanToggleBtn.textContent = 'Stop scanning';
      scanning = true;
      setStatus('Starting camera…');

      await codeReader.decodeFromConstraints(
        { video: { facingMode: { ideal: 'environment' } } },
        video,
        (result, err) => {
          if(result){
            handleScannedCode(result.getText());
          }
        }
      );
      setStatus('Point the camera at the barcode on the back of the book.');
    }catch(e){
      setStatus('Camera access failed: ' + (e.message || e), true);
      stopScanning();
    }
  }

  function stopScanning(){
    if(codeReader){
      try{ codeReader.reset(); }catch(e){}
    }
    videoWrap.classList.remove('active');
    scanToggleBtn.textContent = 'Start scanning';
    scanning = false;
  }

  scanToggleBtn.addEventListener('click', () => {
    if(scanning) stopScanning(); else startScanning();
  });

  manualLookupBtn.addEventListener('click', async () => {
    const isbn = manualIsbnInput.value.trim();
    if(!isbn){ setStatus('Enter an ISBN first.', true); return; }
    manualIsbnInput.value = '';
    await handleScannedCode(isbn);
  });

  manualIsbnInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') manualLookupBtn.click();
  });

  titleLookupBtn.addEventListener('click', async () => {
    const title = manualTitleInput.value.trim();
    if(!title){ setStatus('Enter a title first.', true); return; }
    await searchByTitle(title);
  });

  manualTitleInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') titleLookupBtn.click();
  });

  cancelEntryBtn.addEventListener('click', closeEntry);

  addBookBtn.addEventListener('click', () => {
    const title = fTitle.value.trim();
    if(!title){
      fTitle.focus();
      return;
    }
    books.unshift({
      title: title,
      author: fAuthor.value.trim(),
      isbn: fIsbn.value.trim(),
      year: fYear.value.trim(),
      publisher: fPublisher.value.trim(),
      pageCount: fPageCount.value.trim(),
      language: fLanguage.value.trim(),
      dimensions: fDimensions.value.trim(),
      cover: fCover.value.trim(),
      genre: genreField.getValue(),
      format: formatField.getValue(),
      status: statusField.getValue(),
      source: sourceField.getValue(),
      favourite: fFavourite.checked,
      rating: currentRating,
      series: fSeries.value.trim(),
      seriesNum: fSeriesNum.value.trim(),
      location: selectedShelf,
      lent: fLent.checked,
      lentTo: fLent.checked ? fLentTo.value.trim() : '',
      dateAdded: new Date().toISOString().slice(0,10)
    });
    saveBooks();
    renderBooks();
    closeEntry();
    setStatus('Added "' + title + '" to your list.', false);
  });

  function saveBooks(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
  }

  function statusBadgeClass(status){
    const s = (status || '').toLowerCase();
    if(s === 'reading') return 'badge-reading';
    if(s === 'read') return 'badge-read';
    if(s === 'dnf') return 'badge-dnf';
    return 'badge-tbr';
  }

  function shelfLabelShort(value){
    if(!value) return '';
    const m = value.match(/^R(\d+)B(\d+)$/);
    return m ? ('Shelf ' + m[1] + '.' + m[2]) : '';
  }

  function renderBooks(){
    bookCountEl.textContent = books.length;
    bookListEl.innerHTML = '';
    emptyState.classList.toggle('hidden', books.length > 0);

    books.forEach((b, idx) => {
      const row = document.createElement('div');
      row.className = 'book-row';

      const main = document.createElement('div');
      main.className = 'book-row-main';

      if(b.cover){
        const img = document.createElement('img');
        img.className = 'book-cover';
        img.src = b.cover;
        img.alt = '';
        main.appendChild(img);
      }

      const left = document.createElement('div');
      left.style.minWidth = '0';
      const titleEl = document.createElement('div');
      titleEl.className = 'book-title';
      titleEl.textContent = b.title;
      if(b.favourite){
        const star = document.createElement('span');
        star.className = 'fav-star';
        star.textContent = '★';
        titleEl.appendChild(star);
      }
      const authorEl = document.createElement('div');
      authorEl.className = 'book-author';
      authorEl.textContent = b.author || 'Unknown author';
      const metaEl = document.createElement('div');
      metaEl.className = 'book-meta';
      const metaParts = [];
      if(b.isbn) metaParts.push(b.isbn);
      if(b.year) metaParts.push(b.year);
      if(b.publisher) metaParts.push(b.publisher);
      if(b.pageCount) metaParts.push(b.pageCount + 'pp');
      if(b.location) metaParts.push(shelfLabelShort(b.location));
      metaParts.push(b.dateAdded);
      metaEl.textContent = metaParts.join(' · ');

      const badges = document.createElement('div');
      badges.className = 'badges';
      if(b.status){
        const bd = document.createElement('span');
        bd.className = 'badge ' + statusBadgeClass(b.status);
        bd.textContent = b.status;
        badges.appendChild(bd);
      }
      if(b.format){
        const bd = document.createElement('span');
        bd.className = 'badge badge-format';
        bd.textContent = b.format;
        badges.appendChild(bd);
      }
      if(b.source){
        const bd = document.createElement('span');
        bd.className = 'badge badge-source';
        bd.textContent = b.source;
        badges.appendChild(bd);
      }
      if(b.genre){
        const bd = document.createElement('span');
        bd.className = 'badge badge-format';
        bd.textContent = b.genre;
        badges.appendChild(bd);
      }
      if(b.series){
        const bd = document.createElement('span');
        bd.className = 'badge badge-format';
        bd.textContent = b.series + (b.seriesNum ? ' #' + b.seriesNum : '');
        badges.appendChild(bd);
      }
      if(b.lent){
        const bd = document.createElement('span');
        bd.className = 'badge badge-lent';
        bd.textContent = 'Lent' + (b.lentTo ? ' → ' + b.lentTo : '');
        badges.appendChild(bd);
      }
      if(b.rating){
        const bd = document.createElement('span');
        bd.className = 'badge badge-rating';
        bd.textContent = '★'.repeat(b.rating);
        badges.appendChild(bd);
      }

      left.appendChild(titleEl);
      left.appendChild(authorEl);
      left.appendChild(metaEl);
      left.appendChild(badges);
      main.appendChild(left);

      const delBtn = document.createElement('button');
      delBtn.className = 'del-btn';
      delBtn.textContent = 'Remove';
      delBtn.addEventListener('click', () => {
        books.splice(idx, 1);
        saveBooks();
        renderBooks();
      });

      row.appendChild(main);
      row.appendChild(delBtn);
      bookListEl.appendChild(row);
    });
  }

  function csvEscape(val){
    val = String(val == null ? '' : val);
    if(/[",\n]/.test(val)){
      val = '"' + val.replace(/"/g, '""') + '"';
    }
    return val;
  }

  exportBtn.addEventListener('click', () => {
    if(books.length === 0){
      setStatus('Nothing to export yet.', true);
      return;
    }
    const header = ['Title','Author','ISBN','Format','Status','Favourite','Rating','Series','Series #','Year','Source','Publisher','Page Count','Language','Genre','Dimensions','Cover URL','Location','Lent Out','Lent To','Date Added'];
    const lines = [header.join(',')];
    books.forEach(b => {
      lines.push([
        csvEscape(b.title),
        csvEscape(b.author),
        csvEscape(b.isbn),
        csvEscape(b.format),
        csvEscape(b.status),
        b.favourite ? 'Yes' : 'No',
        csvEscape(b.rating || ''),
        csvEscape(b.series),
        csvEscape(b.seriesNum),
        csvEscape(b.year),
        csvEscape(b.source),
        csvEscape(b.publisher),
        csvEscape(b.pageCount),
        csvEscape(b.language),
        csvEscape(b.genre),
        csvEscape(b.dimensions),
        csvEscape(b.cover),
        csvEscape(b.location),
        b.lent ? 'Yes' : 'No',
        csvEscape(b.lentTo),
        csvEscape(b.dateAdded)
      ].join(','));
    });
    const csvContent = lines.join('\n');
    const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'books-' + new Date().toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  clearBtn.addEventListener('click', () => {
    if(books.length === 0) return;
    if(confirm('Remove all ' + books.length + ' book(s) from this list? This cannot be undone.')){
      books = [];
      saveBooks();
      renderBooks();
    }
  });

  // ---- CSV import ----
  function parseCSVRows(text){
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for(let i = 0; i < text.length; i++){
      const c = text[i];
      if(inQuotes){
        if(c === '"'){
          if(text[i+1] === '"'){ field += '"'; i++; }
          else inQuotes = false;
        } else field += c;
      } else {
        if(c === '"') inQuotes = true;
        else if(c === ','){ row.push(field); field = ''; }
        else if(c === '\n'){ row.push(field); rows.push(row); row = []; field = ''; }
        else if(c === '\r'){ /* skip, \n handles the line break */ }
        else field += c;
      }
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    return rows.filter(r => !(r.length === 1 && r[0].trim() === ''));
  }

  function parseBooksCSV(text){
    const rows = parseCSVRows(text);
    if(rows.length < 2) return [];
    const headerRow = rows[0].map(h => h.trim().toLowerCase());
    const idx = (name) => headerRow.indexOf(name);
    const cols = {
      title: idx('title'), author: idx('author'), isbn: idx('isbn'),
      format: idx('format'), status: idx('status'), favourite: idx('favourite'),
      rating: idx('rating'), series: idx('series'), seriesNum: idx('series #'),
      year: idx('year'), source: idx('source'), publisher: idx('publisher'),
      pageCount: idx('page count'), language: idx('language'), genre: idx('genre'),
      dimensions: idx('dimensions'), cover: idx('cover url'), location: idx('location'),
      lent: idx('lent out'), lentTo: idx('lent to'), dateAdded: idx('date added')
    };
    const get = (r, key) => {
      const i = cols[key];
      return (i !== -1 && r[i] !== undefined) ? r[i].trim() : '';
    };

    const results = [];
    for(let i = 1; i < rows.length; i++){
      const r = rows[i];
      const title = get(r, 'title');
      if(!title) continue;
      results.push({
        title: title,
        author: get(r, 'author'),
        isbn: get(r, 'isbn'),
        format: get(r, 'format'),
        status: get(r, 'status'),
        favourite: /^yes$/i.test(get(r, 'favourite')),
        rating: parseInt(get(r, 'rating'), 10) || 0,
        series: get(r, 'series'),
        seriesNum: get(r, 'seriesNum'),
        year: get(r, 'year'),
        source: get(r, 'source'),
        publisher: get(r, 'publisher'),
        pageCount: get(r, 'pageCount'),
        language: get(r, 'language'),
        genre: get(r, 'genre'),
        dimensions: get(r, 'dimensions'),
        cover: get(r, 'cover'),
        location: get(r, 'location'),
        lent: /^yes$/i.test(get(r, 'lent')),
        lentTo: get(r, 'lentTo'),
        dateAdded: get(r, 'dateAdded') || new Date().toISOString().slice(0,10)
      });
    }
    return results;
  }

  importBtn.addEventListener('click', () => importFileInput.click());

  importFileInput.addEventListener('change', () => {
    const file = importFileInput.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const imported = parseBooksCSV(String(reader.result));
        if(imported.length === 0){
          setStatus('No valid rows found in that CSV.', true);
        } else {
          books = imported.concat(books);
          saveBooks();
          renderBooks();
          setStatus('Imported ' + imported.length + ' book(s).', false);
        }
      }catch(e){
        setStatus('Import failed: ' + (e.message || e), true);
      }
    };
    reader.readAsText(file);
    importFileInput.value = '';
  });

  renderBooks();
})();
</script>
