<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Spine — Book Scanner</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiU3BpbmUiLCJzaG9ydF9uYW1lIjoiU3BpbmUiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI0YzRUZFNCIsInRoZW1lX2NvbG9yIjoiIzMzNEEzOSJ9">
<style>
  :root{
    --paper:#F3EFE4;
    --paper-dim:#E9E2D2;
    --ink:#22201C;
    --spine-green:#334A39;
    --spine-green-dark:#233229;
    --rust:#8A5A3B;
    --rust-dark:#6E4630;
    --gold:#B08D3E;
    --line:#D8CFB8;
    --danger:#8C3B2E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Iowan Old Style','Palatino Linotype',Georgia,serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;}

  header{
    background:var(--spine-green);
    color:var(--paper);
    padding:22px 20px 26px;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute;
    right:-10px; top:-30px;
    width:140px; height:220px;
    border:2px solid rgba(243,239,228,0.15);
    border-radius:3px;
    transform:rotate(12deg);
  }
  header h1{
    margin:0;
    font-size:26px;
    letter-spacing:0.02em;
    font-weight:600;
  }
  header p{
    margin:6px 0 0;
    font-size:13px;
    color:#CFE0D2;
    letter-spacing:0.04em;
    text-transform:uppercase;
  }

  main{
    max-width:640px;
    margin:0 auto;
    padding:18px 16px 40px;
  }

  .card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:6px;
    padding:18px;
    margin-bottom:18px;
    box-shadow:0 1px 0 rgba(0,0,0,0.03);
  }

  .scan-card{
    background:var(--spine-green-dark);
    color:var(--paper);
    text-align:center;
  }
  #video-wrap{
    position:relative;
    width:100%;
    aspect-ratio:4/3;
    background:#111;
    border-radius:4px;
    overflow:hidden;
    display:none;
    margin-bottom:14px;
  }
  #video-wrap.active{display:block;}
  video{width:100%; height:100%; object-fit:cover;}
  .scan-line{
    position:absolute; left:6%; right:6%; top:50%;
    height:2px;
    background:var(--gold);
    box-shadow:0 0 8px 1px var(--gold);
    animation:sweep 1.8s ease-in-out infinite;
  }
  @keyframes sweep{
    0%,100%{top:20%;}
    50%{top:80%;}
  }

  button{
    font-family:inherit;
    font-size:15px;
    border:none;
    border-radius:5px;
    padding:12px 18px;
    cursor:pointer;
    font-weight:600;
    letter-spacing:0.01em;
    transition:transform 0.05s ease, opacity 0.15s ease;
  }
  button:active{transform:scale(0.98);}
  .btn-primary{background:var(--rust); color:#fff;}
  .btn-primary:hover{background:var(--rust-dark);}
  .btn-ghost{background:transparent; color:var(--paper); border:1px solid rgba(243,239,228,0.4);}
  .btn-block{width:100%;}
  .btn-secondary{background:var(--paper-dim); color:var(--ink); border:1px solid var(--line);}
  button:disabled{opacity:0.5; cursor:not-allowed;}

  .manual-row{
    display:flex; gap:8px; margin-top:12px;
  }
  .manual-row input{
    flex:1;
    padding:11px 12px;
    border-radius:5px;
    border:1px solid rgba(243,239,228,0.35);
    background:rgba(255,255,255,0.06);
    color:var(--paper);
    font-family:inherit;
    font-size:15px;
  }
  .manual-row input::placeholder{color:rgba(243,239,228,0.5);}

  .status-line{
    font-size:13px;
    min-height:18px;
    margin-top:10px;
    color:#CFE0D2;
  }
  .status-line.error{color:#E7B7A8;}

  .field{margin-bottom:12px;}
  .field label{
    display:block;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:#6B6558;
    margin-bottom:5px;
  }
  .field input[type=text]{
    width:100%;
    padding:10px 11px;
    border:1px solid var(--line);
    border-radius:4px;
    font-family:inherit;
    font-size:16px;
    background:var(--paper);
    color:var(--ink);
  }
  .toggle-row{
    display:flex;
    gap:20px;
    margin:14px 0 16px;
  }
  .toggle{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:14px;
  }
  .toggle input{width:18px; height:18px; accent-color:var(--spine-green);}

  .entry-actions{display:flex; gap:10px;}

  h2.section-title{
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:#6B6558;
    margin:0 0 10px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  h2.section-title span.count{
    font-family:monospace;
    color:var(--gold);
    font-size:13px;
  }

  .book-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:12px 0;
    border-bottom:1px solid var(--line);
    gap:10px;
  }
  .book-row:last-child{border-bottom:none;}
  .book-title{font-weight:600; font-size:15px; line-height:1.3;}
  .book-author{font-size:13px; color:#6B6558; margin-top:2px;}
  .book-meta{font-size:11px; color:#9C9686; margin-top:4px; font-family:monospace;}
  .badges{display:flex; gap:6px; margin-top:6px;}
  .badge{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    padding:2px 7px;
    border-radius:3px;
    font-weight:700;
  }
  .badge-tbr{background:#EFE1C2; color:#7A5C1E;}
  .badge-read{background:#D9E6DA; color:var(--spine-green-dark);}
  .del-btn{
    background:none;
    border:none;
    color:var(--danger);
    font-size:13px;
    padding:4px 6px;
    text-decoration:underline;
    font-weight:400;
  }

  .empty-state{
    text-align:center;
    color:#9C9686;
    font-size:14px;
    padding:20px 0;
  }

  footer.export-bar{
    position:fixed;
    left:0; right:0; bottom:0;
    background:var(--paper);
    border-top:1px solid var(--line);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    display:flex;
    gap:10px;
  }
  .hidden{display:none !important;}
</style>
</head>
<body>

<header>
  <h1>Spine</h1>
  <p>Scan · Log · Export to Notion</p>
</header>

<main>

  <section class="card scan-card">
    <div id="video-wrap">
      <video id="video" muted playsinline></video>
      <div class="scan-line"></div>
    </div>
    <button id="scan-toggle" class="btn-primary btn-block">Start scanning</button>
    <div class="status-line" id="scan-status">Point the camera at the barcode on the back of the book.</div>

    <div class="manual-row">
      <input type="text" id="manual-isbn" inputmode="numeric" placeholder="or type ISBN manually">
      <button id="manual-lookup" class="btn-ghost">Look up</button>
    </div>
  </section>

  <section class="card hidden" id="entry-card">
    <h2 class="section-title">New entry</h2>
    <div class="field">
      <label for="f-title">Title</label>
      <input type="text" id="f-title">
    </div>
    <div class="field">
      <label for="f-author">Author</label>
      <input type="text" id="f-author">
    </div>
    <div class="field">
      <label for="f-isbn">ISBN</label>
      <input type="text" id="f-isbn" class="mono">
    </div>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="f-tbr" checked> To be read</label>
      <label class="toggle"><input type="checkbox" id="f-read"> Read</label>
    </div>
    <div class="entry-actions">
      <button id="add-book" class="btn-primary btn-block">Add to list</button>
      <button id="cancel-entry" class="btn-secondary">Cancel</button>
    </div>
  </section>

  <section class="card">
    <h2 class="section-title">Your books <span class="count" id="book-count">0</span></h2>
    <div id="book-list"></div>
    <div class="empty-state" id="empty-state">No books yet — scan one to get started.</div>
  </section>

</main>

<footer class="export-bar">
  <button id="export-csv" class="btn-secondary btn-block">Export CSV for Notion</button>
  <button id="clear-all" class="btn-ghost" style="color:var(--danger); border-color:var(--danger);">Clear</button>
</footer>

<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
(function(){
  "use strict";

  const STORAGE_KEY = 'spine-book-list';
  let books = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

  const scanToggleBtn = document.getElementById('scan-toggle');
  const videoWrap = document.getElementById('video-wrap');
  const video = document.getElementById('video');
  const scanStatus = document.getElementById('scan-status');
  const manualIsbnInput = document.getElementById('manual-isbn');
  const manualLookupBtn = document.getElementById('manual-lookup');

  const entryCard = document.getElementById('entry-card');
  const fTitle = document.getElementById('f-title');
  const fAuthor = document.getElementById('f-author');
  const fIsbn = document.getElementById('f-isbn');
  const fTbr = document.getElementById('f-tbr');
  const fRead = document.getElementById('f-read');
  const addBookBtn = document.getElementById('add-book');
  const cancelEntryBtn = document.getElementById('cancel-entry');

  const bookListEl = document.getElementById('book-list');
  const bookCountEl = document.getElementById('book-count');
  const emptyState = document.getElementById('empty-state');

  const exportBtn = document.getElementById('export-csv');
  const clearBtn = document.getElementById('clear-all');

  let codeReader = null;
  let scanning = false;

  function setStatus(msg, isError){
    scanStatus.textContent = msg;
    scanStatus.classList.toggle('error', !!isError);
  }

  function openEntry(data){
    fTitle.value = (data && data.title) || '';
    fAuthor.value = (data && data.author) || '';
    fIsbn.value = (data && data.isbn) || '';
    fTbr.checked = true;
    fRead.checked = false;
    entryCard.classList.remove('hidden');
    entryCard.scrollIntoView({behavior:'smooth', block:'nearest'});
  }

  function closeEntry(){
    entryCard.classList.add('hidden');
  }

  async function lookupISBN(isbn){
    setStatus('Looking up ' + isbn + '…');
    try{
      const res = await fetch('https://openlibrary.org/api/books?bibkeys=ISBN:' + isbn + '&format=json&jscmd=data');
      const data = await res.json();
      const key = 'ISBN:' + isbn;
      if(data[key] && data[key].title){
        const rec = data[key];
        return {
          title: rec.title || '',
          author: (rec.authors || []).map(a => a.name).join(', '),
          isbn: isbn
        };
      }
    }catch(e){ /* fall through to Google Books */ }

    try{
      const res = await fetch('https://www.googleapis.com/books/v1/volumes?q=isbn:' + isbn);
      const data = await res.json();
      if(data.items && data.items.length){
        const info = data.items[0].volumeInfo;
        return {
          title: info.title || '',
          author: (info.authors || []).join(', '),
          isbn: isbn
        };
      }
    }catch(e){ /* no luck */ }

    return null;
  }

  async function handleScannedCode(isbn){
    isbn = isbn.replace(/[^0-9Xx]/g, '');
    stopScanning();
    const result = await lookupISBN(isbn);
    if(result){
      setStatus('Found: ' + result.title, false);
      openEntry(result);
    } else {
      setStatus('No match found for ' + isbn + ' — fill it in manually below.', true);
      openEntry({isbn: isbn});
    }
  }

  async function startScanning(){
    if(scanning) return;
    if(!('BrowserMultiFormatReader' in ZXing)){
      setStatus('Barcode library failed to load. Check your connection.', true);
      return;
    }
    try{
      codeReader = new ZXing.BrowserMultiFormatReader();
      videoWrap.classList.add('active');
      scanToggleBtn.textContent = 'Stop scanning';
      scanning = true;
      setStatus('Starting camera…');

      await codeReader.decodeFromConstraints(
        { video: { facingMode: { ideal: 'environment' } } },
        video,
        (result, err) => {
          if(result){
            handleScannedCode(result.getText());
          }
        }
      );
      setStatus('Point the camera at the barcode on the back of the book.');
    }catch(e){
      setStatus('Camera access failed: ' + (e.message || e), true);
      stopScanning();
    }
  }

  function stopScanning(){
    if(codeReader){
      try{ codeReader.reset(); }catch(e){}
    }
    videoWrap.classList.remove('active');
    scanToggleBtn.textContent = 'Start scanning';
    scanning = false;
  }

  scanToggleBtn.addEventListener('click', () => {
    if(scanning) stopScanning(); else startScanning();
  });

  manualLookupBtn.addEventListener('click', async () => {
    const isbn = manualIsbnInput.value.trim();
    if(!isbn){ setStatus('Enter an ISBN first.', true); return; }
    manualIsbnInput.value = '';
    await handleScannedCode(isbn);
  });

  manualIsbnInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') manualLookupBtn.click();
  });

  cancelEntryBtn.addEventListener('click', closeEntry);

  addBookBtn.addEventListener('click', () => {
    const title = fTitle.value.trim();
    if(!title){
      fTitle.focus();
      return;
    }
    books.unshift({
      title: title,
      author: fAuthor.value.trim(),
      isbn: fIsbn.value.trim(),
      tbr: fTbr.checked,
      read: fRead.checked,
      dateAdded: new Date().toISOString().slice(0,10)
    });
    saveBooks();
    renderBooks();
    closeEntry();
    setStatus('Added "' + title + '" to your list.', false);
  });

  function saveBooks(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
  }

  function renderBooks(){
    bookCountEl.textContent = books.length;
    bookListEl.innerHTML = '';
    emptyState.classList.toggle('hidden', books.length > 0);

    books.forEach((b, idx) => {
      const row = document.createElement('div');
      row.className = 'book-row';

      const left = document.createElement('div');
      const titleEl = document.createElement('div');
      titleEl.className = 'book-title';
      titleEl.textContent = b.title;
      const authorEl = document.createElement('div');
      authorEl.className = 'book-author';
      authorEl.textContent = b.author || 'Unknown author';
      const metaEl = document.createElement('div');
      metaEl.className = 'book-meta';
      metaEl.textContent = (b.isbn ? b.isbn + ' · ' : '') + b.dateAdded;

      const badges = document.createElement('div');
      badges.className = 'badges';
      if(b.tbr){
        const bd = document.createElement('span');
        bd.className = 'badge badge-tbr';
        bd.textContent = 'TBR';
        badges.appendChild(bd);
      }
      if(b.read){
        const bd = document.createElement('span');
        bd.className = 'badge badge-read';
        bd.textContent = 'Read';
        badges.appendChild(bd);
      }

      left.appendChild(titleEl);
      left.appendChild(authorEl);
      left.appendChild(metaEl);
      left.appendChild(badges);

      const delBtn = document.createElement('button');
      delBtn.className = 'del-btn';
      delBtn.textContent = 'Remove';
      delBtn.addEventListener('click', () => {
        books.splice(idx, 1);
        saveBooks();
        renderBooks();
      });

      row.appendChild(left);
      row.appendChild(delBtn);
      bookListEl.appendChild(row);
    });
  }

  function csvEscape(val){
    val = String(val == null ? '' : val);
    if(/[",\n]/.test(val)){
      val = '"' + val.replace(/"/g, '""') + '"';
    }
    return val;
  }

  exportBtn.addEventListener('click', () => {
    if(books.length === 0){
      setStatus('Nothing to export yet.', true);
      return;
    }
    const header = ['Title','Author','ISBN','TBR','Read','Date Added'];
    const lines = [header.join(',')];
    books.forEach(b => {
      lines.push([
        csvEscape(b.title),
        csvEscape(b.author),
        csvEscape(b.isbn),
        b.tbr ? 'Yes' : 'No',
        b.read ? 'Yes' : 'No',
        csvEscape(b.dateAdded)
      ].join(','));
    });
    const csvContent = lines.join('\n');
    const blob = new Blob([csvContent], {type: 'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'books-' + new Date().toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  clearBtn.addEventListener('click', () => {
    if(books.length === 0) return;
    if(confirm('Remove all ' + books.length + ' book(s) from this list? This cannot be undone.')){
      books = [];
      saveBooks();
      renderBooks();
    }
  });

  renderBooks();
})();
</script>
</body>
</html>
